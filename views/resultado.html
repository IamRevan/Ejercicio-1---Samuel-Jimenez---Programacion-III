<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Resultados - UNETI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary": "#4648d4",
                      "secondary": "#8127cf",
                      "on-surface": "#1b1b23",
                      "on-surface-variant": "#464554",
                      "background": "#fcf8ff",
              }
            },
          },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top left, #fcf8ff 0%, #e1e0ff 40%, #f0dbff 100%);
            overflow-x: hidden;
        }
        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(49, 46, 129, 0.08);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4648d4 0%, #8127cf 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(129, 39, 207, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-between bg-background selection:bg-indigo-100">
    <header class="w-full py-6 px-8 animate__animated animate__fadeInDown">
        <div class="max-w-7xl mx-auto flex justify-center md:justify-start">
            <div class="text-3xl font-extrabold text-primary tracking-tight">ZooVibe</div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center w-full px-6 py-12">
        <div class="glass-card w-full max-w-lg rounded-xl p-10 flex flex-col items-center text-center space-y-6 animate__animated animate__zoomIn">
            <div class="relative animate__animated animate__bounceIn animate__delay-1s">
                <div class="text-6xl leading-none">🎉</div>
            </div>

            <div class="space-y-2">
                <h1 class="text-2xl font-bold text-on-surface">Tu animal favorito es:</h1>
                <div class="py-4">
                    <span id="nombreAnimal" class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary animate__animated animate__pulse animate__infinite">
                        Cargando...
                    </span>
                </div>
            </div>

            <div class="inline-flex items-center gap-2 px-4 py-2 bg-emerald-50 border border-emerald-200 rounded-full animate__animated animate__fadeIn animate__delay-2s">
                <span class="material-symbols-outlined text-emerald-600 text-lg">check_circle</span>
                <span class="text-emerald-700 font-bold text-xs uppercase tracking-wider">Respuesta registrada</span>
            </div>

            <div class="pt-6 w-full">
                <a class="btn-gradient inline-block w-full py-4 text-white font-bold rounded-xl shadow-lg text-lg" href="/">
                    Volver a intentar
                </a>
            </div>
        </div>
    </main>

    <footer class="w-full bg-white/40 backdrop-blur-sm py-8 border-t border-gray-200/50 animate__animated animate__fadeInUp">
        <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <p class="font-bold text-primary text-lg">UNETI</p>
                <p class="text-on-surface-variant text-sm">Universidad Nacional Experimental de las Telecomunicaciones e Informática</p>
            </div>
            
            <div class="text-center md:text-right">
                <p class="font-semibold text-on-surface">Samuel Jimenez</p>
                <p class="text-on-surface-variant text-sm">C.I. 31192094</p>
                <p class="text-primary/70 text-xs font-bold mt-1 uppercase tracking-widest">Actividad de Programación - Node.js</p>
            </div>
        </div>
    </footer>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const animal = parametros.get('nombre');
        document.getElementById('nombreAnimal').innerText = animal ? animal : "No se ingresó ninguno";
    </script>
</body>
</html>
